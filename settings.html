<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>設定 - エラッタオリジナリティ</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<main id="settings-screen">


    <h1>
        設定
    </h1>



    <section>

        <h2>
            サウンド
        </h2>


        <label>

            <input type="checkbox" id="bgm-setting">

            BGM

        </label>


        <br>


        <label>

            <input type="checkbox" id="se-setting">

            効果音

        </label>


    </section>





    <section>

        <h2>
            演出
        </h2>


        <label>

            <input type="checkbox" id="effect-setting" checked>

            エフェクト表示

        </label>


    </section>





    <section>

        <h2>
            データ管理
        </h2>


        <button id="delete-data">

            全データ削除

        </button>


    </section>





    <button onclick="location.href='menu.html'">

        戻る

    </button>



</main>



<script src="js/settings.js"></script>


</body>

</html>
